version: '3.8'
services:
  mongo:
    image: mongo:6.0
    restart: unless-stopped
    volumes:
      - mongo-data:/data/db
    ports:
      - "27017:27017"
    networks:
      - shared_net

  fastapi:
    build: ./fastapi
    container_name: backend_fastapi
    depends_on:
      - mongo
    env_file:
      - ./fastapi/.env
    ports:
      - "9000:8000"
    networks:
      - shared_net

volumes:
  mongo-data:
networks:
  shared_net:
    external: true
    name: shared_net
