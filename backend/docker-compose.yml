version: '3.8'
services:
  mongo:
    image: mongo:6.0
    restart: unless-stopped
    volumes:
      - mongo-data:/data/db
    ports:
      - "27017:27017"

  fastapi:
    build: ./fastapi
    depends_on:
      - mongo
    env_file:
      - ./fastapi/.env
    ports:
      - "9000:8000"

volumes:
  mongo-data: